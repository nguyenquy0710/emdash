# docker-compose.yml
version: "3.9"

services:
  emdash:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4321:4321"
    volumes:
      - ./data:/app/data
      - ./public:/app/public
    environment:
      - NODE_ENV=development
    depends_on:
      - db

